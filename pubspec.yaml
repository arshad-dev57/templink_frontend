name: templink
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  convex_bottom_bar: ^3.2.0
  
  # Toast & Feedback
  delightful_toast: ^1.1.0
  shimmer: ^3.0.0
  
  # HTTP & Networking
  http: ^0.13.6
  dio: ^5.9.1
  mime: ^1.0.4
  http_parser: ^4.0.2
  
  # Files & PDF
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  open_file: ^3.5.11
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  flutter_pdfview: ^1.4.4
  printing: ^5.14.2
  pdf: ^3.11.3
  flutter_downloader: ^1.12.0
  fl_chart: ^0.66.2
  pin_code_fields: ^8.0.1
  
  # Device & Storage
  device_info_plus: ^12.3.0
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  flutter_stripe: ^11.3.0
  webview_flutter: ^4.7.0
  onesignal_flutter: ^5.4.1
  socket_io_client: ^2.0.3+1
  video_player: ^2.8.6
  google_sign_in: ^6.2.1
  uuid: ^4.5.2
  url_launcher: ^6.3.2
  app_links: ^3.5.0
  path: ^1.9.0
  signature: ^5.4.0
  share_plus: ^12.0.1
  screenshot: ^3.0.0
  image: ^4.5.4
  flutter_webrtc: ^1.3.1
  audioplayers: ^6.6.0
  flutter_callkit_incoming: ^3.0.0
  mime_type: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Assets - aapke fonts yahan hain
  assets:
    - assets/
    - assets/Roboto-Regular.ttf
    - assets/Roboto-Bold.ttf
    # Agar aur assets hain to unhe bhi add karein
    # - assets/images/
  
  # Fonts configuration - YEH ADD KARNA ZAROORI HAI
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/Roboto-Regular.ttf
          weight: 400
        - asset: assets/Roboto-Bold.ttf
          weight: 700