name: templink
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.8.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  delightful_toast: ^1.1.0
  http: ^0.13.6
  convex_bottom_bar: ^3.2.0
  image_picker: ^1.2.1

  # PDF Related
  flutter_pdfview: ^1.4.4
  flutter_downloader: ^1.12.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1

  # File & Network
  file_picker: ^10.3.10
  open_file: ^3.5.11
  dio: ^5.9.1

  # Storage & UX
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
